# kubectl create secret generic highperf-ingest-secrets --from-literal=postgres-connection-string='Host=...;...' -n default
# Or apply (DO NOT commit real credentials):
apiVersion: v1
kind: Secret
metadata:
  name: highperf-ingest-secrets
type: Opaque
stringData:
  postgres-connection-string: "Host=YOUR_PG_HOST;Port=5432;Database=high_performance_ingest;Username=app;Password=CHANGE_ME;SSL Mode=Require"
